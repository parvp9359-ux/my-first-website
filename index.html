<!DOCTYPE html>
<html>
<head>
  <title>Parv Website</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
    }

    h1 {
      margin-top: 50px;
      animation: move 2s infinite alternate;
    }

    @keyframes move {
      from { transform: translateX(0); }
      to { transform: translateX(100px); }
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 20px;
      background: white;
      color: black;
      font-size: 16px;
      cursor: pointer;
    }

    img {
      border-radius: 50%;
      margin-top: 20px;
    }

    a {
      display: block;
      margin-top: 20px;
      color: yellow;
      text-decoration: none;
      font-size: 18px;
    }
  </style>

</head>

<body>

  <h1>Hello Parv 👋</h1>

  <p>Welcome to my animated website 🚀</p>

  <!-- Photo -->
  <img src="https://via.placeholder.com/150" alt="photo">

  <br><br>

  <!-- Button -->
  <button onclick="alert('Button Clicked 😄')">Click Me</button>

  <!-- Link -->
  <a href="#">More Coming Soon...</a>

</body>
</html>
