<!DOCTYPE html>
<html>
<head>
  <title>Parv Website</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      color: white;

      background: linear-gradient(-45deg, #00c6ff, #0072ff, #ff6a00, #ff00cc);
      background-size: 400% 400%;
      animation: gradient 6s ease infinite;
    }

    @keyframes gradient {
      0% {background-position: 0%;}
      50% {background-position: 100%;}
      100% {background-position: 0%;}
    }

    h1 {
      margin-top: 50px;
      animation: move 2s infinite alternate;
    }

    @keyframes move {
      from { transform: translateX(0); }
      to { transform: translateX(100px); }
    }

    img {
      border-radius: 50%;
      margin-top: 20px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 20px;
      background: white;
      color: black;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
    }

    button:hover {
      background: yellow;
      transform: scale(1.1);
    }

    a {
      margin: 10px;
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    .navbar {
      background: black;
      padding: 15px;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      background: black;
    }

    input, textarea {
      padding: 10px;
      width: 80%;
      max-width: 300px;
    }
  </style>

</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>

  <!-- Heading -->
  <h1>Hello Parv 👋</h1>

  <p>Welcome to my professional website 🚀</p>

  <!-- Photo -->
  <img src="https://via.placeholder.com/150" width="150">

  <br><br>

  <!-- Buttons -->
  <button onclick="alert('Welcome Parv 😄')">Click Me</button>

  <button onclick="window.location.href='mailto:youremail@gmail.com'">
    Contact Me
  </button>

  <!-- Contact Form -->
  <h2>Contact Form</h2>

  <form action="https://formspree.io/f/yourID" method="POST">
    <input type="text" name="name" placeholder="Your Name" required><br><br>
    <input type="email" name="email" placeholder="Your Email" required><br><br>
    <textarea name="message" placeholder="Your Message"></textarea><br><br>
    <button type="submit">Send</button>
  </form>

  <!-- Footer -->
  <footer>
    <p>© 2026 Parv Website</p>
  </footer>

</body>
</html>
