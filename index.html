<!DOCTYPE html>
<html>
<head>
  <title>Parv Website</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      color: white;

      background: linear-gradient(-45deg, #00c6ff, #0072ff, #ff6a00, #ff00cc);
      background-size: 400% 400%;
      animation: gradient 6s ease infinite;
    }

    @keyframes gradient {
      0% {background-position: 0%;}
      50% {background-position: 100%;}
      100% {background-position: 0%;}
    }

    h1 {
      margin-top: 50px;
      animation: move 2s infinite alternate;
    }

    @keyframes move {
      from { transform: translateX(0); }
      to { transform: translateX(100px); }
    }

    img {
      border-radius: 50%;
      margin-top: 20px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 20px;
      background: white;
      color: black;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
    }

    a {
      display: block;
      margin-top: 20px;
      color: yellow;
      text-decoration: none;
      font-size: 18px;
    }
  </style>

</head>

<body>

  <h1>Hello Parv 👋</h1>

  <p>Welcome to my professional website 🚀</p>

  <!-- Photo -->
  <img src="https://via.placeholder.com/150" width="150">

  <br><br>

  <!-- Buttons -->
  <button onclick="alert('Welcome Parv 😄')">Click Me</button>

  <button onclick="window.location.href='mailto:youremail@gmail.com'">
    Contact Me
  </button>

  <!-- Link -->
  <a href="#">More features coming soon...</a>

</body>
</html>
