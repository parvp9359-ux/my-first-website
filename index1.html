<!DOCTYPE html>
<html>
<head>
    <title>AI Focus Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🧠 Focus Tracker</h1>

    <select id="subject">
        <option>DBMS</option>
        <option>Java</option>
        <option>HTML</option>
    </select>

    <h2 id="timer">25:00</h2>

    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>
    <button onclick="toggleMode()">🌙 Mode</button>

    <br><br>

    <button onclick="playMusic()">🎧 Music</button>

    <h3 id="result"></h3>
</div>

<script src="script.js"></script>
</body>
  </html>
